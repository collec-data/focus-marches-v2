configs:
  dotenv:
    file: .env

services:
  db:
    image: mariadb:latest@sha256:350261292d0129fd4b24f537dcf05ecd3ebe34d39d5b592af551f38310e7a167
    restart: always
    shm_size: 128mb
    environment:
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - /var/lib/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      
  api:
    build: ./api
    image: focus-marches-v2-api
    ports:
      - 8000:80
    environment:
      DATABASE_URL: mariadb+mariadbconnector://${MARIADB_USER}:${MARIADB_PASSWORD}@db:3306/${MARIADB_DATABASE}
    env_file:
      - .env

  front:
    build: ./front
    image: focus-marches-v2-front
    ports:
      - 80:80
    env_file:
      - .env