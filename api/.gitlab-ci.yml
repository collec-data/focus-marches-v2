docker-image-api:
  extends: .build-docker
  variables:
    IMAGE: "${REGISTRY}focus-marches-v2/api"
    BUILD_CONTEXT: "api/."

api-quality:
  stage: 🔍 build-quality
  image: python:3.14.5-alpine@sha256:5a824eb82cc75361f98611f3cfc5091ea33f10a6ccea4d4ebdabbc523b9a1614
  variables:
    FORCE_COLOR: true
  script:
    - apk add build-base mariadb mariadb-dev
    - python3 -m venv .venv
    - source .venv/bin/activate
    - cd api
    - pip install --upgrade pip
    - pip install -r dev-requirements.txt
    - unset DOCKER_AUTH_CONFIG # XXX: On ignore la configuration au sein des tests du à une incompatibilité avec testcontainers
    - coverage run -m pytest --cov-report xml:cov.xml --cov-report=term
    - ruff format --check . || touch failed
    - ruff check . || touch failed
    - mypy . --strict || touch failed
    - '[ ! -e failed ] || ( echo "Ruff et/ou mypy ont remonté des erreurs, voir les logs précédents"; exit 1 )'
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: api/cov.xml
